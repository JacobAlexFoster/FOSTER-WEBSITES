<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Quiz 2</title>
<link rel="stylesheet" href="Quiz.css">
</head>

<body>

<div class="quiz-wrapper">

<header class="quiz-header">
<h1>Business Quiz 2</h1>
<div id="progress" class="quiz-progress">Question 1 of 1</div>
</header>

<main id="question-container" class="quiz-body"></main>

<footer class="quiz-footer">
<button id="submit" class="btn-primary">Submit</button>
<div id="results" class="quiz-results hidden"></div>
</footer>

</div>

<script src="QuizEngine.js"></script>

<script>
loadQuiz("testquiz");

const file = location.pathname.split("/").pop();

const topicMap = {
"BusinessQuiz1.html": "Business Topic 1",
"BusinessQuiz2.html": "Business Topic 2",
"BusinessQuiz3.html": "Business Topic 3",
"BusinessQuiz4.html": "Business Topic 4",
"BusinessQuiz5.html": "Business Topic 5",
"BusinessQuiz6.html": "Business Topic 6",
"BusinessFormulaQuiz1.html": "Business Topic 1 Equations",
"BusinessFormulaQuiz2.html": "Business Topic 2 Equations",
"BusinessFormulaQuiz3.html": "Business Topic 3 Equations",
"BusinessFormulaQuiz4.html": "Business Topic 4 Equations",
"BusinessFormulaQuiz5.html": "Business Topic 5 Equations",
"BusinessFormulaQuiz6.html": "Business Topic 6 Equations"
};

const topicName = topicMap[file];

function updateMastery(topicName, amount) {
    let mastery = JSON.parse(localStorage.getItem("businessMastery"));

    if (!mastery) mastery = {};

    if (!mastery[topicName]) mastery[topicName] = 0;

    mastery[topicName] = Math.min(100, mastery[topicName] + amount);

    localStorage.setItem("businessMastery", JSON.stringify(mastery));
}

function handleQuizCompletion(score, totalQuestions) {
    if (score === totalQuestions) {
        updateMastery(topicName, 5);
    }

    setTimeout(() => {
        window.location.href = "Business.html";
    }, 1500);
}
</script>

</body>
</html>
